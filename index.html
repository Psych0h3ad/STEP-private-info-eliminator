<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STEP Sanitizer — STEPファイルの識別情報をブラウザ内で除去</title>
<meta name="description" content="STEP (ISO 10303-21) ファイルから作成者・CADソフト名・日時などの個人識別メタデータを除去します。処理はすべてブラウザ内で完結し、ファイルはどこにも送信されません。 Remove identifying metadata from STEP files, entirely in your browser.">
<style>
:root{
  --paper:#F2F4F0;
  --panel:#FBFCFA;
  --grid:rgba(28,40,48,.055);
  --ink:#1C2830;
  --muted:#64737E;
  --line:#CBD4CD;
  --mark:#C13A28;
  --mark-bg:#F9ECE8;
  --ok:#2B7A55;
  --ok-bg:#E8F2EB;
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Courier New",monospace;
  --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI","Yu Gothic","Meiryo","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);
  color:var(--ink);
  background-color:var(--paper);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:24px 24px;
  line-height:1.65;
  font-size:15px;
}
.wrap{max-width:860px;margin:0 auto;padding:40px 20px 72px}
a{color:var(--ink)}
.mono{font-family:var(--mono);font-size:.92em}
button{font-family:var(--sans)}

/* ---- topbar & masthead ---- */
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--muted)}
.langs{display:flex;border:1px solid var(--line);border-radius:2px;overflow:hidden;background:var(--panel)}
.langs button{font-family:var(--mono);font-size:11.5px;letter-spacing:.04em;padding:5px 11px;border:none;background:transparent;color:var(--muted);cursor:pointer}
.langs button + button{border-left:1px solid var(--line)}
.langs button[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
.langs button:hover{color:var(--ink)}
.langs button[aria-pressed="true"]:hover{color:var(--paper)}
h1{font-size:clamp(34px,6vw,52px);font-weight:800;letter-spacing:-.015em;line-height:1.12}
.lede{margin-top:12px;font-size:16px;max-width:44em}
.assure{list-style:none;display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.assure li{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--line);background:var(--panel);
  padding:5px 12px;border-radius:2px;font-size:13px;font-weight:600;
}
.assure li::before{content:"✓";color:var(--ok);font-weight:800}

/* ---- panels & section titles ---- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:26px 26px 28px;margin-top:28px}
.sec-t{font-size:13px;font-weight:800;letter-spacing:.2em;color:var(--ink);display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sec-t::after{content:"";flex:1;height:1px;background:var(--line)}
.sub-t{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--muted);margin:22px 0 10px}
.sub-t:first-of-type{margin-top:0}
@media (prefers-reduced-motion:no-preference){
  .panel.reveal{animation:rise .35s ease-out}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
}

/* ---- drop zone (製図枠) ---- */
.drop{
  position:relative;margin-top:34px;background:var(--panel);
  border:1px solid var(--line);border-radius:2px;
  padding:56px 24px;text-align:center;cursor:pointer;
}
.drop::before{
  content:"";position:absolute;inset:8px;pointer-events:none;
  background:
    linear-gradient(var(--ink),var(--ink)) left top / 16px 2px,
    linear-gradient(var(--ink),var(--ink)) left top / 2px 16px,
    linear-gradient(var(--ink),var(--ink)) right top / 16px 2px,
    linear-gradient(var(--ink),var(--ink)) right top / 2px 16px,
    linear-gradient(var(--ink),var(--ink)) left bottom / 16px 2px,
    linear-gradient(var(--ink),var(--ink)) left bottom / 2px 16px,
    linear-gradient(var(--ink),var(--ink)) right bottom / 16px 2px,
    linear-gradient(var(--ink),var(--ink)) right bottom / 2px 16px;
  background-repeat:no-repeat;
}
.drop.over{background:var(--ok-bg)}
.drop.busy{cursor:progress}
.drop-ext{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:.08em}
.drop-msg{margin-top:10px;font-weight:600}
.drop-sub{margin-top:6px;font-size:12.5px;color:var(--muted)}
.err{margin-top:14px;color:var(--mark);font-weight:600;font-size:14px}

/* ---- report table ---- */
.fileline{color:var(--muted);font-size:12.5px;margin-bottom:18px;word-break:break-all}
.hdr-t{width:100%;border-collapse:collapse}
.hdr-t td{padding:8px 10px;border-top:1px solid var(--line);vertical-align:top;font-size:13.5px}
.hdr-t tr:first-child td{border-top:none}
.hdr-t .k{width:9.5em;color:var(--muted);font-family:var(--mono);font-size:12px;padding-top:10px;white-space:nowrap}
.hdr-t .v{font-family:var(--mono);word-break:break-all}
.hdr-t .v.empty{color:var(--muted)}
.hdr-t .c{width:6.5em;text-align:right;white-space:nowrap}
tr.hit .v{color:var(--mark)}
.chip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:2px}
.chip.mark{color:var(--mark);background:var(--mark-bg)}
.chip.ok{color:var(--ok);background:var(--ok-bg)}

.find{padding:10px 0;border-top:1px solid var(--line);display:grid;grid-template-columns:1fr auto;gap:4px 14px;align-items:baseline}
.find:first-of-type{border-top:none;padding-top:0}
.find .fk{font-weight:700;font-size:13.5px}
.find .fn{font-size:12.5px;color:var(--muted);grid-column:1 / -1;margin-top:-2px}
.find .fx{grid-column:1 / -1}
.samp{font-family:var(--mono);font-size:12px;color:var(--muted);word-break:break-all;margin-top:2px}
.tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--paper);padding:2px 8px;border-radius:2px;word-break:break-all}
.tag.bad{border-color:var(--mark);color:var(--mark);background:var(--mark-bg)}
details{margin-top:14px}
summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--muted)}
.strlist{margin-top:8px;font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.9;word-break:break-all}

/* ---- options ---- */
.opts{display:grid;gap:14px}
.opt-in label{display:block;font-size:13px;font-weight:700;margin-bottom:5px}
.opt-in input[type=text]{
  width:100%;font-family:var(--mono);font-size:13.5px;color:var(--ink);
  padding:9px 11px;border:1px solid var(--line);border-radius:2px;background:#fff;
}
.opt-in input[type=text]:focus-visible{outline:2px solid var(--ink);outline-offset:1px}
.opt-in .hint{font-size:12px;color:var(--muted);margin-top:4px}
.opt-in .hint.warn{color:var(--mark);font-weight:600}
.checks{display:grid;gap:8px;margin-top:4px}
.checks label{display:flex;gap:9px;align-items:flex-start;font-size:14px;cursor:pointer}
.checks input{margin-top:4px;accent-color:var(--ink)}
.actionrow{margin-top:22px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.primary{
  background:var(--ink);color:var(--paper);border:none;border-radius:2px;
  font-size:15px;font-weight:700;padding:13px 26px;cursor:pointer;letter-spacing:.02em;
}
.primary:hover{background:#0F171D}
.ghost{background:transparent;border:1px solid var(--line);border-radius:2px;font-size:13.5px;font-weight:600;padding:9px 16px;cursor:pointer;color:var(--ink)}
.ghost:hover{border-color:var(--ink)}
button:focus-visible,.drop:focus-visible,a:focus-visible,summary:focus-visible{outline:2px solid var(--ink);outline-offset:2px}

/* ---- result / redaction ledger ---- */
.done-line{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;font-size:14px}
.done-line .mono{word-break:break-all}
.sumlist{list-style:none;margin-top:14px;display:grid;gap:6px}
.sumlist li{font-size:14px;padding-left:22px;position:relative}
.sumlist li::before{content:"✔";position:absolute;left:0;color:var(--ok);font-weight:800}
.ledger{margin-top:8px;border-top:1px solid var(--line)}
.led{display:flex;gap:12px;align-items:baseline;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.led .lo{font-family:var(--mono);color:var(--mark);text-decoration:line-through;text-decoration-thickness:1.5px;word-break:break-all}
.led .arr{color:var(--muted);flex-shrink:0}
.led .ln{font-family:var(--mono);color:var(--muted);flex-shrink:0}
.led-more{padding:7px 0;font-size:12.5px;color:var(--muted)}

/* ---- footer ---- */
footer{margin-top:44px;border-top:1px solid var(--line);padding-top:22px;font-size:13px;color:var(--muted)}
footer h2{font-size:12px;letter-spacing:.18em;color:var(--ink);margin:18px 0 6px}
footer h2:first-of-type{margin-top:0}
footer p{max-width:52em}
.credit{margin-top:22px;font-family:var(--mono);font-size:11.5px;letter-spacing:.06em}

@media (max-width:560px){
  .wrap{padding:28px 14px 56px}
  .panel{padding:20px 16px 22px}
  .hdr-t .k{width:7em}
  .hdr-t td{padding:7px 6px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="topbar">
    <div class="eyebrow">3DPcoLAB TOOLS / PRIVACY</div>
    <div class="langs" role="group" aria-label="Language">
      <button type="button" data-lang="ja">日本語</button>
      <button type="button" data-lang="en">EN</button>
      <button type="button" data-lang="zh">中文</button>
    </div>
  </div>
  <h1>STEP Sanitizer</h1>
  <p class="lede" data-i18n="lede"></p>
  <ul class="assure">
    <li data-i18n="assure1"></li>
    <li data-i18n="assure2"></li>
    <li data-i18n="assure3"></li>
  </ul>
</header>

<div id="drop" class="drop" tabindex="0" role="button" data-i18n-aria="ariaDrop">
  <div class="drop-ext">.STEP / .STP</div>
  <div class="drop-msg" id="dropMsg"></div>
  <div class="drop-sub" data-i18n="dropSub"></div>
</div>
<input type="file" id="fileInput" accept=".step,.stp,.p21,.ste,.STEP,.STP" hidden>
<p id="err" class="err" hidden></p>

<section id="reportSec" class="panel" hidden aria-live="polite">
  <h2 class="sec-t" data-i18n="secScan"></h2>
  <div class="fileline mono" id="fileLine"></div>
  <div class="sub-t">HEADER</div>
  <table class="hdr-t"><tbody id="hdrBody"></tbody></table>
  <div class="sub-t">DATA</div>
  <div id="dataBody"></div>
  <details id="otherWrap" hidden>
    <summary data-i18n="otherSummary"></summary>
    <div class="strlist" id="otherList"></div>
  </details>
</section>

<section id="optSec" class="panel" hidden>
  <h2 class="sec-t" data-i18n="secOpts"></h2>
  <div class="opts">
    <div class="opt-in">
      <label for="optName" data-i18n="optNameLabel"></label>
      <input type="text" id="optName" autocomplete="off" spellcheck="false" data-i18n-ph="optNamePh">
      <div class="hint" id="nameHint"></div>
    </div>
    <div class="opt-in">
      <label for="optProduct" data-i18n="optProductLabel"></label>
      <input type="text" id="optProduct" autocomplete="off" spellcheck="false" data-i18n-ph="optProductPh">
      <div class="hint" id="productHint"></div>
    </div>
    <div class="checks">
      <label><input type="checkbox" id="optDates" checked><span data-i18n="optDates"></span></label>
      <label><input type="checkbox" id="optComments" checked><span data-i18n="optComments"></span></label>
      <label><input type="checkbox" id="optX2" checked><span data-i18n="optX2"></span></label>
    </div>
  </div>
  <div class="actionrow">
    <button id="goBtn" class="primary" type="button" data-i18n="goBtn"></button>
  </div>
</section>

<section id="resultSec" class="panel" hidden aria-live="polite">
  <h2 class="sec-t" data-i18n="secResult"></h2>
  <div class="done-line"><span data-i18n="savedAs"></span><span class="mono" id="outName"></span><a href="#" id="redl" download data-i18n="redl"></a></div>
  <ul class="sumlist" id="sumList"></ul>
  <div class="sub-t" data-i18n="subLedger"></div>
  <div class="ledger" id="ledger"></div>
  <div class="actionrow">
    <button id="resetBtn" class="ghost" type="button" data-i18n="resetBtn"></button>
  </div>
</section>

<footer>
  <h2 data-i18n="fHow"></h2>
  <p data-i18n="fHowP"></p>
  <h2 data-i18n="fPriv"></h2>
  <p data-i18n="fPrivP"></p>
  <h2 data-i18n="fLimit"></h2>
  <p data-i18n="fLimitP"></p>
  <div class="credit">STEP SANITIZER — 100% CLIENT-SIDE / NO UPLOADS / MIT LICENSE</div>
</footer>

</div>

<script>
/* step_sanitize core — STEP (ISO 10303-21) メタデータ除去ロジック
   Python版 step_sanitize.py とバイト単位で同一出力になるよう移植。
   すべてブラウザ内で完結する純粋なテキスト処理。 */
'use strict';

const SCRUB_STRING_ENTITIES = new Set(
  ['PERSON', 'ORGANIZATION', 'PERSONAL_ADDRESS', 'ORGANIZATIONAL_ADDRESS']);
const DATE_ENTITIES = new Set(['CALENDAR_DATE', 'LOCAL_TIME']);
const EPOCH_TS = '1970-01-01T00:00:00';

/* ---------------- バイト⇔文字列 (latin-1 透過: バイト完全保存) ---------------- */

function bytesToLatin1(u8) {
  let s = '';
  const CH = 0x8000;
  for (let i = 0; i < u8.length; i += CH) {
    s += String.fromCharCode.apply(null, u8.subarray(i, Math.min(i + CH, u8.length)));
  }
  return s;
}

function latin1ToBytes(s) {
  const u8 = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) u8[i] = s.charCodeAt(i) & 0xFF;
  return u8;
}

function toRaw(s) {  // UI入力(UTF-16文字列) → UTF-8バイト → latin-1透過表現
  return bytesToLatin1(new TextEncoder().encode(s));
}

function decodeX(s) {  // \X2\(UTF-16BE) / \X4\(UTF-32BE) を可読化
  s = s.replace(/\\X2\\([0-9A-Fa-f]+)\\X0\\/g, (m, h) => {
    if (h.length % 4) return m;
    let o = '';
    for (let i = 0; i < h.length; i += 4) o += String.fromCharCode(parseInt(h.slice(i, i + 4), 16));
    return o;
  });
  s = s.replace(/\\X4\\([0-9A-Fa-f]+)\\X0\\/g, (m, h) => {
    if (h.length % 8) return m;
    try {
      let o = '';
      for (let i = 0; i < h.length; i += 8) o += String.fromCodePoint(parseInt(h.slice(i, i + 8), 16));
      return o;
    } catch (e) { return m; }
  });
  return s;
}

function displayStr(s) {  // レポート表示用: UTF-8デコード + \X2\可読化
  try {
    s = new TextDecoder('utf-8', { fatal: true }).decode(latin1ToBytes(s));
  } catch (e) { /* UTF-8でなければそのまま */ }
  return decodeX(s);
}

/* ---------------- 低レベルパース ---------------- */

function iterRecords(text) {
  // トップレベルの ';' でレコード区間を列挙。文字列・コメント内の ';' は無視。
  const records = [], comments = [];
  let i = 0;
  const n = text.length;
  let start = 0, inStr = false, comStart = -1;
  while (i < n) {
    const c = text[i];
    if (inStr) {
      if (c === "'") {
        if (i + 1 < n && text[i + 1] === "'") { i += 2; continue; }
        inStr = false;
      }
      i++; continue;
    }
    if (comStart >= 0) {
      if (c === '*' && i + 1 < n && text[i + 1] === '/') {
        comments.push([comStart, i + 2]); comStart = -1; i += 2; continue;
      }
      i++; continue;
    }
    if (c === "'") inStr = true;
    else if (c === '/' && i + 1 < n && text[i + 1] === '*') { comStart = i; i++; }
    else if (c === ';') { records.push([start, i]); start = i + 1; }
    i++;
  }
  return { records, comments };
}

function recWithoutComments(text, s, e, comments) {
  if (!comments.length) return text.slice(s, e);
  const out = [];
  let pos = s;
  for (const [a, b] of comments) {
    if (b <= s || a >= e) continue;
    out.push(text.slice(pos, Math.max(a, s)));
    pos = Math.min(b, e);
  }
  out.push(text.slice(pos, e));
  return out.join('');
}

function findParens(rec) {
  let inStr = false, depth = 0, openI = -1;
  let i = 0;
  const n = rec.length;
  while (i < n) {
    const c = rec[i];
    if (inStr) {
      if (c === "'") {
        if (i + 1 < n && rec[i + 1] === "'") { i += 2; continue; }
        inStr = false;
      }
      i++; continue;
    }
    if (c === "'") inStr = true;
    else if (c === '(') { if (depth === 0) openI = i; depth++; }
    else if (c === ')') { depth--; if (depth === 0) return [openI, i]; }
    i++;
  }
  return [-1, -1];
}

function splitParams(s) {
  const parts = [];
  let buf = [];
  let depth = 0, inStr = false;
  let i = 0;
  const n = s.length;
  while (i < n) {
    const c = s[i];
    if (inStr) {
      buf.push(c);
      if (c === "'") {
        if (i + 1 < n && s[i + 1] === "'") { buf.push(s[i + 1]); i += 2; continue; }
        inStr = false;
      }
      i++; continue;
    }
    if (c === "'") { inStr = true; buf.push(c); }
    else if (c === '(') { depth++; buf.push(c); }
    else if (c === ')') { depth--; buf.push(c); }
    else if (c === ',' && depth === 0) { parts.push(buf.join('').trim()); buf = []; }
    else buf.push(c);
    i++;
  }
  const tail = buf.join('').trim();
  if (tail || parts.length) parts.push(tail);
  return parts;
}

const stepStr = s => "'" + s.replace(/'/g, "''") + "'";

function unstepStr(tok) {
  tok = tok.trim();
  if (tok.length >= 2 && tok[0] === "'" && tok[tok.length - 1] === "'") {
    return tok.slice(1, -1).replace(/''/g, "'");
  }
  return tok;
}

/* ---------------- 書き換え処理 ---------------- */

function blankStrings(rec) {
  const [o, c] = findParens(rec);
  if (o < 0) return [rec, 0];
  const inner = rec.slice(o + 1, c);
  let n = 0;
  for (const m of inner.matchAll(/'(?:[^']|'')*'/g)) if (m[0].length > 2) n++;
  if (!n) return [rec, 0];
  return [rec.slice(0, o + 1) + inner.replace(/'(?:[^']|'')*'/g, "''") + rec.slice(c), n];
}

function blankXStrings(rec) {
  const [o, c] = findParens(rec);
  if (o < 0) return [rec, 0];
  const inner = rec.slice(o + 1, c);
  let cnt = 0;
  const newInner = inner.replace(/'(?:[^']|'')*'/g, m => {
    if (/\\X[24]\\/.test(m)) { cnt++; return "''"; }
    return m;
  });
  if (!cnt) return [rec, 0];
  return [rec.slice(0, o + 1) + newInner + rec.slice(c), cnt];
}

const INT_RE = /^[+-]?\d+$/;
const REAL_RE = /^[+-]?(?:\d+\.\d*|\.\d+|\d+)(?:[Ee][+-]?\d+)?$/;

function neutralizeDates(rec, ename) {
  const [o, c] = findParens(rec);
  if (o < 0) return [rec, false];
  const params = splitParams(rec.slice(o + 1, c));
  let changed = false;
  if (ename === 'CALENDAR_DATE') {
    const defaults = ['1970', '1', '1'];
    for (let i = 0; i < params.length; i++) {
      if (INT_RE.test(params[i])) { params[i] = i < 3 ? defaults[i] : '0'; changed = true; }
    }
  } else {  // LOCAL_TIME
    for (let i = 0; i < params.length; i++) {
      if (INT_RE.test(params[i])) { params[i] = '0'; changed = true; }
      else if (REAL_RE.test(params[i])) { params[i] = '0.0'; changed = true; }
    }
  }
  if (!changed) return [rec, false];
  return [rec.slice(0, o + 1) + params.join(',') + rec.slice(c), true];
}

function stripCommentsText(text) {
  const res = [];
  let i = 0;
  const n = text.length;
  let inStr = false;
  while (i < n) {
    const c = text[i];
    if (inStr) {
      res.push(c);
      if (c === "'") {
        if (i + 1 < n && text[i + 1] === "'") { res.push(text[i + 1]); i += 2; continue; }
        inStr = false;
      }
      i++; continue;
    }
    if (c === "'") { inStr = true; res.push(c); i++; continue; }
    if (c === '/' && i + 1 < n && text[i + 1] === '*') {
      const j = text.indexOf('*/', i + 2);
      if (j < 0) { res.push(text.slice(i)); break; }
      i = j + 2;
      continue;
    }
    res.push(c);
    i++;
  }
  return res.join('');
}

/* ---------------- メイン処理 (Python版 process と等価) ---------------- */

function process(text, opts) {
  const { records, comments } = iterRecords(text);
  const repls = new Array(records.length).fill(null);
  const rep = {
    header: null, fileDesc: null,
    scrubbed: {}, samples: [], stringsBlanked: 0,
    dates: 0, datesChanged: 0,
    products: [], productRenamed: 0,
    x2Blanked: 0, x2Found: 0, x2Strings: [],
    dataStrings: new Map(),
    comments: comments.map(([a, b]) => text.slice(a, b)),
  };
  let section = null;

  for (let idx = 0; idx < records.length; idx++) {
    const [s, e] = records[idx];
    const rec = recWithoutComments(text, s, e, comments);
    const key = rec.trim().toUpperCase();
    if (key === 'HEADER') { section = 'H'; continue; }
    if (key === 'DATA' || key.startsWith('DATA(')) { section = 'D'; continue; }  // ed3対応
    if (key === 'ENDSEC') { section = null; continue; }

    if (section === 'H') {
      const m = rec.match(/^\s*([A-Za-z0-9_]+)\s*\(/);
      if (!m) continue;
      const hname = m[1].toUpperCase();
      const [o, c] = findParens(rec);
      if (o < 0) continue;
      const params = splitParams(rec.slice(o + 1, c));
      const lead = rec.match(/^\s*/)[0];

      if (hname === 'FILE_NAME') {
        while (params.length < 7) params.push("''");
        rep.header = {
          name: unstepStr(params[0]),
          timestamp: unstepStr(params[1]),
          author: params[2],
          organization: params[3],
          preprocessor: unstepStr(params[4]),
          originatingSystem: unstepStr(params[5]),
          authorisation: unstepStr(params[6]),
        };
        if (opts.scan) continue;
        let newName;
        if (opts.name != null && opts.name !== '') newName = toRaw(opts.name);
        else if (opts.keepName) newName = rep.header.name;
        else newName = rep.header.name.split(/[\\/]/).pop();
        const ts = opts.keepDates ? rep.header.timestamp : EPOCH_TS;
        repls[idx] = lead + 'FILE_NAME(' + stepStr(newName) + ',' + stepStr(ts) +
          ",(''),(''),'','','')";
      } else if (hname === 'FILE_DESCRIPTION') {
        rep.fileDesc = params.length ? params[0] : '()';
        if (opts.scan) continue;
        const impl = params.length > 1 ? params[1] : "'2;1'";
        repls[idx] = lead + "FILE_DESCRIPTION(('')," + impl + ')';
      }

    } else if (section === 'D') {
      const m = rec.match(/^\s*#\d+\s*=\s*([A-Za-z0-9_]+)\s*\(/);
      if (!m) continue;
      const ename = m[1].toUpperCase();

      if (SCRUB_STRING_ENTITIES.has(ename)) {
        rep.scrubbed[ename] = (rep.scrubbed[ename] || 0) + 1;
        if (rep.samples.length < 8) rep.samples.push(rec.trim());
        if (!opts.scan) {
          const [nr, n] = blankStrings(rec);
          if (n) { repls[idx] = nr; rep.stringsBlanked += n; }
        }
      } else if (DATE_ENTITIES.has(ename)) {
        rep.dates++;
        if (!opts.scan && !opts.keepDates) {
          const [nr, ch] = neutralizeDates(rec, ename);
          if (ch) { repls[idx] = nr; rep.datesChanged++; }
        }
      } else if (ename === 'PRODUCT') {
        const [o, c] = findParens(rec);
        const params = o >= 0 ? splitParams(rec.slice(o + 1, c)) : [];
        if (params.length >= 2) rep.products.push(unstepStr(params[1]));
        if (opts.product && !opts.scan && params.length >= 2) {
          const nv = stepStr(toRaw(opts.product));
          params[0] = nv;
          params[1] = nv;
          if (params.length >= 3 && params[2].startsWith("'")) params[2] = "''";
          repls[idx] = rec.slice(0, o + 1) + params.join(',') + rec.slice(c);
          rep.productRenamed++;
        }
      } else if (opts.scan) {
        for (const mm of rec.matchAll(/'(?:[^']|'')*'/g)) {
          if (mm[0].length > 2) {
            const v = unstepStr(mm[0]);
            rep.dataStrings.set(v, (rep.dataStrings.get(v) || 0) + 1);
          }
        }
      }

      // 非ASCIIエスケープ(\X2\等)入り文字列 = フィーチャー名などのユーザー由来
      if (/\\X[24]\\/.test(rec)) {
        if (opts.scan) {
          for (const mm of rec.matchAll(/'(?:[^']|'')*'/g)) {
            if (/\\X[24]\\/.test(mm[0])) { rep.x2Found++; rep.x2Strings.push(unstepStr(mm[0])); }
          }
        } else if (!opts.keepX2 && repls[idx] === null) {
          const [nr, n] = blankXStrings(rec);
          if (n) { repls[idx] = nr; rep.x2Blanked += n; }
        }
      }
    }
  }

  if (opts.scan) return { newText: null, rep, recordCount: records.length };

  const out = [];
  for (let i = 0; i < records.length; i++) {
    const [s, e] = records[i];
    out.push((repls[i] !== null ? repls[i] : text.slice(s, e)) + ';');
  }
  const tailStart = records.length ? records[records.length - 1][1] + 1 : 0;
  out.push(text.slice(tailStart));
  let newText = out.join('');
  if (comments.length && !opts.keepComments) newText = stripCommentsText(newText);
  return { newText, rep, recordCount: records.length };
}

if (typeof module !== 'undefined' && module.exports) {

    bytesToLatin1, latin1ToBytes, toRaw, displayStr, decodeX,

const LS_KEY = 'stepsan.lang';

function detectLang() {
  try {
    const q = new URLSearchParams(location.search).get('lang');
    if (q && I18N[q]) return q;
  } catch (e) {}
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved && I18N[saved]) return saved;
  } catch (e) {}
  const nav = (navigator.language || 'en').toLowerCase();
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('zh')) return 'zh';
  return 'en';
}

  const v = (I18N[LANG] && I18N[LANG][key]) ?? I18N.ja[key] ?? key;
  return typeof v === 'function' ? v(...args) : v;
}

  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(n => { n.textContent = t(n.dataset.i18n); });
  document.querySelectorAll('[data-i18n-ph]').forEach(n => { n.placeholder = t(n.dataset.i18nPh); });
  document.querySelectorAll('[data-i18n-aria]').forEach(n => { n.setAttribute('aria-label', t(n.dataset.i18nAria)); });
  document.querySelectorAll('.langs button').forEach(b => {
    b.setAttribute('aria-pressed', b.dataset.lang === LANG ? 'true' : 'false');
  });
  if (dropState !== 'busy') {
    $('dropMsg').textContent = t(dropState === 'again' ? 'dropMsgAgain' : 'dropMsg');
  }
}

function switchLang(l) {
  if (!I18N[l] || l === LANG) return;
  LANG = l;
  try { localStorage.setItem(LS_KEY, l); } catch (e) {}
  applyStatic();
  if (state.rep) {
    renderReport(state.rep, state.fileName, state.fileSize, state.recordCount);
    renderOptionHints(state.rep);
  }
  if (state.lastResult && !$('resultSec').hidden) {
    const r = state.lastResult;
    renderResult(r.rep, r.opts, r.outName, r.inSize, r.outSize);
  }
}

/* ---------- ファイル読み込み ---------- */

const drop = $('drop'), fileInput = $('fileInput'), errEl = $('err');

function showErr(msg) {
  errEl.textContent = msg;
  errEl.hidden = false;
}

function resetAll() {
  if (state.blobUrl) URL.revokeObjectURL(state.blobUrl);
  Object.assign(state, {
    text: null, fileName: null, fileSize: 0, recordCount: 0,
    rep: null, blobUrl: null, lastBytes: null, lastResult: null,
  });
  ['reportSec', 'optSec', 'resultSec'].forEach(id => { $(id).hidden = true; });
  errEl.hidden = true;
  $('optName').value = '';
  $('optProduct').value = '';
  $('optDates').checked = $('optComments').checked = $('optX2').checked = true;
  dropState = 'idle';
  drop.classList.remove('busy');
  applyStatic();
  drop.focus();
}

function pickFile(file) {
  errEl.hidden = true;
  if (!file) return;
  if (file.size > 300 * 1024 * 1024) {
    showErr(t('errTooBig'));
    return;
  }
  dropState = 'busy';
  drop.classList.add('busy');
  $('dropMsg').textContent = t('analyzing') + file.name;
  const reader = new FileReader();
  reader.onerror = () => { showErr(t('errRead')); endBusy(); };
  reader.onload = () => {
    setTimeout(() => {  // 描画を挟んでから重い処理へ
      try {
        loadBytes(file.name, new Uint8Array(reader.result));
      } catch (e) {
        showErr(t('errParse', e.message));
      }
      endBusy();
    }, 30);
  };
  reader.readAsArrayBuffer(file);
}

function endBusy() {
  dropState = 'again';
  drop.classList.remove('busy');
  $('dropMsg').textContent = t('dropMsgAgain');
}

function loadBytes(name, u8) {
  // 形式判定(マジックバイト)
  if (u8.length >= 4 && u8[0] === 0x50 && u8[1] === 0x4B && u8[2] === 0x03 && u8[3] === 0x04) {
    showErr(t('errZip')); return;
  }
  if (u8.length >= 2 && u8[0] === 0x1F && u8[1] === 0x8B) {
    showErr(t('errGzip')); return;
  }
  if (u8.length >= 4 && u8[0] === 0x89 && u8[1] === 0x48 && u8[2] === 0x44 && u8[3] === 0x46) {
    showErr(t('errHdf')); return;
  }
  const text = bytesToLatin1(u8);
  const head = text.slice(0, 300);
  if (/^\s*(?:\u00EF\u00BB\u00BF)?\s*<\?xml/.test(head)) {
    showErr(t('errXml')); return;
  }
  const first = head.replace(/^\u00EF\u00BB\u00BF/, '').split(';')[0].trim().toUpperCase();
  if (first !== 'ISO-10303-21') {
    showErr(t('errNotStep')); return;
  }
  if (state.blobUrl) { URL.revokeObjectURL(state.blobUrl); state.blobUrl = null; }
  state.text = text;
  state.fileName = name;
  state.fileSize = u8.length;
  const { rep, recordCount } = process(text, {
    scan: true, name: null, keepName: false,
    keepDates: false, keepComments: false, keepX2: false, product: null,
  });
  state.rep = rep;
  state.recordCount = recordCount;
  state.lastResult = null;
  renderReport(rep, name, u8.length, recordCount);
  renderOptionHints(rep);
  $('resultSec').hidden = true;
  $('reportSec').hidden = false;
  $('optSec').hidden = false;
  $('reportSec').classList.add('reveal');
  $('reportSec').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ---------- 検出レポート描画 ---------- */

const isEmptyList = v => /^\(\s*(?:''\s*,?\s*)*\)$/.test(v.trim()) || v.trim() === '()';

function hdrRow(tbody, label, rawValue, hit) {
  const tr = el('tr', hit ? 'hit' : null);
  tr.appendChild(el('td', 'k', label));
  const v = el('td', 'v' + (rawValue ? '' : ' empty'));
  v.textContent = rawValue ? trunc(displayStr(rawValue)) : t('hdrEmpty');
  tr.appendChild(v);
  const c = el('td', 'c');
  c.appendChild(el('span', 'chip ' + (hit ? 'mark' : 'ok'), hit ? t('chipFound') : t('chipEmpty')));
  tr.appendChild(c);
  tbody.appendChild(tr);
  return tr;
}

function findRow(parent, label, hit, chipText, note) {
  const row = el('div', 'find');
  row.appendChild(el('div', 'fk', label));
  const c = el('div');
  c.appendChild(el('span', 'chip ' + (hit ? 'mark' : 'ok'), chipText));
  row.appendChild(c);
  if (note) row.appendChild(el('div', 'fn', note));
  parent.appendChild(row);
  return row;
}

function renderReport(rep, name, size, recordCount) {
  $('fileLine').textContent =
    `${name} ・ ${fmtBytes(size)} ・ ${recordCount.toLocaleString('en-US')} records`;

  const tb = $('hdrBody');
  tb.textContent = '';
  const h = rep.header;
  if (h) {
    const hasPath = /[\\/]/.test(h.name);
    const nameRow = hdrRow(tb, 'name', h.name, !!h.name);
    if (hasPath) nameRow.querySelector('.chip').textContent = t('chipPath');
    hdrRow(tb, 'timestamp', h.timestamp, !!h.timestamp);
    hdrRow(tb, 'author', isEmptyList(h.author) ? '' : h.author, !isEmptyList(h.author));
    hdrRow(tb, 'organization', isEmptyList(h.organization) ? '' : h.organization, !isEmptyList(h.organization));
    hdrRow(tb, 'preprocessor', h.preprocessor, !!h.preprocessor);
    hdrRow(tb, 'originating_system', h.originatingSystem, !!h.originatingSystem);
    hdrRow(tb, 'authorisation', h.authorisation, !!h.authorisation);
  } else {
    const tr = el('tr');
    tr.appendChild(el('td', null, t('noHeader')));
    tb.appendChild(tr);
  }

  const db = $('dataBody');
  db.textContent = '';

  const scrubKeys = Object.keys(rep.scrubbed);
  const scrubTotal = scrubKeys.reduce((a, k) => a + rep.scrubbed[k], 0);
  const r1 = findRow(db, t('findPersons'),
    scrubTotal > 0, scrubTotal > 0 ? t('chipCount', scrubTotal) : t('chipNone'));
  if (rep.samples.length) {
    const fx = el('div', 'fx');
    rep.samples.slice(0, 3).forEach(s => fx.appendChild(el('div', 'samp', trunc(displayStr(s)))));
    r1.appendChild(fx);
  }

  findRow(db, t('findDates'),
    rep.dates > 0, rep.dates > 0 ? t('chipCount', rep.dates) : t('chipNone'),
    rep.dates > 0 ? t('noteDates') : null);

  const x2u = [...new Set(rep.x2Strings.map(displayStr))];
  const r3 = findRow(db, t('findX2'),
    rep.x2Found > 0, rep.x2Found > 0 ? t('chipCount', rep.x2Found) : t('chipNone'),
    rep.x2Found > 0 ? t('noteX2') : null);
  if (x2u.length) {
    const fx = el('div', 'fx tagrow');
    x2u.slice(0, 12).forEach(v => fx.appendChild(el('span', 'tag bad', trunc(v, 40))));
    r3.appendChild(fx);
  }

  const r4 = findRow(db, t('findProduct'),
    rep.products.length > 0, rep.products.length ? t('chipCount', rep.products.length) : t('chipNone'),
    rep.products.length ? t('noteProduct') : null);
  if (rep.products.length) {
    const fx = el('div', 'fx tagrow');
    [...new Set(rep.products.map(displayStr))].slice(0, 8)
      .forEach(v => fx.appendChild(el('span', 'tag', trunc(v, 48))));
    r4.appendChild(fx);
  }

  const r5 = findRow(db, t('findComments'),
    rep.comments.length > 0, rep.comments.length ? t('chipCount', rep.comments.length) : t('chipNone'));
  if (rep.comments.length) {
    const fx = el('div', 'fx');
    rep.comments.slice(0, 3).forEach(s => fx.appendChild(el('div', 'samp', trunc(displayStr(s)))));
    r5.appendChild(fx);
  }

  const others = [...rep.dataStrings.entries()].sort((a, b) => b[1] - a[1]).slice(0, 20);
  $('otherWrap').hidden = others.length === 0;
  const ol = $('otherList');
  ol.textContent = '';
  others.forEach(([v, n]) => ol.appendChild(el('div', null, `${n}× ${trunc(displayStr(v), 88)}`)));
}

function renderOptionHints(rep) {
  const nh = $('nameHint'), ph = $('productHint');
  nh.className = 'hint';
  ph.className = 'hint';
  if (rep.header && /[\\/]/.test(rep.header.name)) {
    nh.textContent = t('hintNamePath', displayStr(rep.header.name.split(/[\\/]/).pop()));
  } else if (rep.header && rep.header.name) {
    nh.textContent = t('hintNameKeep', trunc(displayStr(rep.header.name), 60));
  } else {
    nh.textContent = '';
  }
  if (rep.products.some(p => /\\X[24]\\/.test(p))) {
    ph.textContent = t('hintProductX2');
    ph.className = 'hint warn';
  } else if (rep.products.length) {
    ph.textContent = t('hintProductCur',
      [...new Set(rep.products.map(displayStr))].slice(0, 3).map(s => trunc(s)).join(' / '));
  } else {
    ph.textContent = '';
  }
}

/* ---------- サニタイズ実行 ---------- */

function outFileName(name) {
  const m = name.match(/^(.*?)(\.[^.]*)?$/);
  return (m[1] || 'output') + '_clean' + (m[2] || '.step');
}

function sanitize() {
  if (!state.text) return;
  const opts = {
    scan: false,
    name: $('optName').value.trim() || null,
    keepName: false,
    keepDates: !$('optDates').checked,
    keepComments: !$('optComments').checked,
    keepX2: !$('optX2').checked,
    product: $('optProduct').value.trim() || null,
  };
  const { newText, rep } = process(state.text, opts);
  const bytes = latin1ToBytes(newText);
  state.lastBytes = bytes;
  const outName = outFileName(state.fileName);

  if (state.blobUrl) URL.revokeObjectURL(state.blobUrl);
  const blob = new Blob([bytes], { type: 'application/step' });
  state.blobUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = state.blobUrl;
  a.download = outName;
  document.body.appendChild(a);
  a.click();
  a.remove();

  state.lastResult = { rep, opts, outName, inSize: state.text.length, outSize: bytes.length };
  renderResult(rep, opts, outName, state.text.length, bytes.length);
  $('resultSec').hidden = false;
  $('resultSec').classList.add('reveal');
  $('resultSec').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderResult(rep, opts, outName, inSize, outSize) {
  $('outName').textContent = outName;
  const rd = $('redl');
  rd.href = state.blobUrl;
  rd.setAttribute('download', outName);

  const sl = $('sumList');
  sl.textContent = '';
  const add = txt => sl.appendChild(el('li', null, txt));
  if (rep.header) add(t('sumHeader'));
  if (!opts.keepDates) add(t('sumDates', rep.datesChanged));
  if (rep.stringsBlanked) {
    const c = Object.entries(rep.scrubbed).map(([k, v]) => `${k}×${v}`).join(' ');
    add(t('sumScrub', c, rep.stringsBlanked));
  }
  if (rep.x2Blanked) add(t('sumX2', rep.x2Blanked));
  if (rep.productRenamed) add(t('sumProduct', opts.product, rep.productRenamed));
  if (rep.comments.length && !opts.keepComments) add(t('sumComments', rep.comments.length));
  add(t('sumSize', fmtBytes(inSize), fmtBytes(outSize)));

  const lg = $('ledger');
  lg.textContent = '';
  const items = [];
  const h = rep.header;
  if (h) {
    if (h.preprocessor) items.push([h.preprocessor, t('nSoftware')]);
    if (h.originatingSystem) items.push([h.originatingSystem, t('nSystem')]);
    if (!isEmptyList(h.author)) items.push([h.author, t('nAuthor')]);
    if (!isEmptyList(h.organization)) items.push([h.organization, t('nOrg')]);
    if (h.authorisation) items.push([h.authorisation, t('nApprover')]);
    if (!opts.keepDates && h.timestamp) items.push([h.timestamp, t('nTime')]);
    if (h.name && (opts.name || /[\\/]/.test(h.name))) items.push([h.name, t('nName')]);
  }
  if (!opts.keepX2) [...new Set(rep.x2Strings)].forEach(v => items.push([v, t('nFeature')]));
  if (rep.productRenamed) [...new Set(rep.products)].forEach(v => items.push([v, t('nProduct')]));
  if (!opts.keepComments) rep.comments.forEach(v => items.push([v, t('nComment')]));

  items.slice(0, 14).forEach(([v, n]) => {
    const row = el('div', 'led');
    row.appendChild(el('span', 'lo', trunc(displayStr(v), 84)));
    row.appendChild(el('span', 'arr', t('ledRemoved')));
    row.appendChild(el('span', 'ln', n));
    lg.appendChild(row);
  });
  if (items.length > 14) lg.appendChild(el('div', 'led-more', t('ledMore', items.length - 14)));
  if (!items.length) lg.appendChild(el('div', 'led-more', t('ledClean')));
}

/* ---------- イベント ---------- */

drop.addEventListener('click', () => fileInput.click());
drop.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
});
fileInput.addEventListener('change', () => pickFile(fileInput.files[0]));
['dragover', 'dragenter'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave', 'drop'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => pickFile(e.dataTransfer.files[0]));
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());
$('goBtn').addEventListener('click', sanitize);
$('resetBtn').addEventListener('click', resetAll);
document.querySelectorAll('.langs button').forEach(b =>
  b.addEventListener('click', () => switchLang(b.dataset.lang)));

applyStatic();

/* テスト用フック(挙動には影響しません) */
window.__stepsan = { loadBytes, sanitize, switchLang, state, get lang() { return LANG; } };

})();
</script>
